name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & type-check ────────────────────────────────────────────────────
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node setup ──────────────────────────────────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run ESLint
        working-directory: apps/web
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: apps/web
        run: npx tsc --noEmit

      # ── Python setup ─────────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('apps/api/requirements*.txt', 'apps/worker/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install Python lint tools
        run: pip install flake8 mypy types-psycopg2

      - name: Install API deps for mypy
        run: |
          if [ -f apps/api/requirements.txt ]; then
            pip install -r apps/api/requirements.txt
          fi

      - name: Run flake8 on API
        run: |
          if [ -d apps/api ]; then
            flake8 apps/api --max-line-length=100 --exclude=.venv,__pycache__,migrations
          fi

      - name: Run flake8 on Worker
        run: |
          if [ -d apps/worker ]; then
            flake8 apps/worker --max-line-length=100 --exclude=.venv,__pycache__
          fi

      - name: Run mypy on API
        run: |
          if [ -d apps/api ]; then
            mypy apps/api --ignore-missing-imports --exclude '(.venv|migrations)' || true
          fi

  # ── 2. API tests ─────────────────────────────────────────────────────────────
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: talentora
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: talentora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U talentora -d talentora_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://talentora:test_password@localhost:5432/talentora_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test_secret_key_for_ci_only_do_not_use_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: test
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('apps/api/requirements*.txt', 'requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov httpx
          if [ -f apps/api/requirements.txt ]; then
            pip install -r apps/api/requirements.txt
          fi
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install psycopg2-binary

      - name: Apply database schema
        run: |
          export PGPASSWORD=test_password
          psql -h localhost -U talentora -d talentora_test \
            -f infra/migrations/001_initial_schema.sql || true

      - name: Run pytest
        run: |
          pytest tests/ \
            --cov=apps/api \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            --tb=short \
            -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── 3. Web / Next.js build & test ────────────────────────────────────────────
  test-web:
    name: Web Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run Next.js lint
        working-directory: apps/web
        run: npm run lint

      - name: Build Next.js app
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
        run: npm run build

  # ── 4. Security scanning ─────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python security ──────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit on API
        run: |
          if [ -d apps/api ]; then
            bandit -r apps/api \
              -x apps/api/.venv,apps/api/tests \
              -ll \
              --format json \
              -o bandit-api-report.json || true
            bandit -r apps/api \
              -x apps/api/.venv,apps/api/tests \
              -ll
          fi

      - name: Run bandit on Worker
        run: |
          if [ -d apps/worker ]; then
            bandit -r apps/worker \
              -x apps/worker/.venv \
              -ll || true
          fi

      - name: Run bandit on seed scripts
        run: |
          bandit -r infra/seed -ll || true

      # ── Node.js security ─────────────────────────────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run npm audit
        working-directory: apps/web
        run: npm audit --audit-level=high || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-api-report.json
          if-no-files-found: ignore
